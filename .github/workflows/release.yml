name: release

on:
  push:
    tags:
      - "*.*.*"

jobs:
  release:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Install Velopack CLI
      run: dotnet tool install -g vpk
      shell: pwsh

    - name: Download previous release from S3
      continue-on-error: true
      run: |
        vpk download s3 `
          --bucket ${{ secrets.BUCKET_NAME }} `
          --endpoint https://${{ secrets.BUCKET_ENDPOINT }} `
          --keyId ${{ secrets.BUCKET_ACCESS_KEY_ID }} `
          --secret ${{ secrets.BUCKET_SECRET_ACCESS_KEY }} `
          --prefix releases `
          --disablePathStyle
      shell: pwsh

    - name: Build installer
      run: .\scripts\build-installer.ps1 -Version ${{ github.ref_name }}
      shell: pwsh

    - name: Upload release to S3
      run: |
        vpk upload s3 `
          --bucket ${{ secrets.BUCKET_NAME }} `
          --endpoint https://${{ secrets.BUCKET_ENDPOINT }} `
          --keyId ${{ secrets.BUCKET_ACCESS_KEY_ID }} `
          --secret ${{ secrets.BUCKET_SECRET_ACCESS_KEY }} `
          --prefix releases `
          --disablePathStyle
      shell: pwsh

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
          files: |
            Releases/*-Setup.exe
