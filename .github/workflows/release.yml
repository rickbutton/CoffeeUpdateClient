name: release

on:
  push:
    tags:
      - "*.*.*"

jobs:
  release:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Build installer
      run: .\scripts\build-installer.ps1 -Version ${{ github.ref_name }}
      shell: pwsh

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
          files: |
            Releases/*
